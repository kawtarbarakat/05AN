<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - 05AN</title>

    <link rel="stylesheet" href="checkout.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="collection.html">COLLECTIONS</a>
                <a href="bestsellers.html">BEST SELLERS</a>
            </div>

            <div class="title">
                <h1>05AN</h1>
            </div>

            <div class="nav-right">
                <a href="index.html">HOME</a>
                <a href="aboutus.html">ABOUT US</a>
                <a href="contact.html">CONTACTS</a>
            </div>
        </nav>
    </header>

    <div id="orderMessage" class="order-message"></div>

    <div class="bottle-container" id="bottleContainer"></div>
    <div class="glow"></div>

    <div class="checkout-page">

        <h1>Complete Your Order</h1>

        <div class="checkout-box">

            <div class="checkout-product">
                <img id="img">
                <div>
                    <h2 id="name"></h2>
                    <p id="price"></p>
                    <p>Quantity: <span id="qty"></span></p>
                    <h3 id="total"></h3>
                </div>
            </div>

            <div class="checkout-form">
                <input type="text" placeholder="Full Name" id="customerName">
                <input type="text" placeholder="Address" id="address">
                <input type="text" placeholder="Phone Number" id="phone">

                <button onclick="placeOrder()">Confirm Order</button>
            </div>

        </div>

    </div>

    <script>
        
        const storedProduct = JSON.parse(localStorage.getItem("selectedProduct"));

        if (!storedProduct) {
            document.body.innerHTML =
                "<h2 style='color:white;text-align:center;margin-top:50px'>No product selected</h2>";
            throw new Error("No product selected");
        }

        const qty = storedProduct.quantity || 1;
        const total = storedProduct.price * qty;

        document.getElementById("img").src = storedProduct.image;
        document.getElementById("name").innerText = storedProduct.name;
        document.getElementById("price").innerText = "$" + storedProduct.price;
        document.getElementById("qty").innerText = qty;
        document.getElementById("total").innerText = "Total: $" + total;

        function placeOrder() {

            const name = document.getElementById("customerName").value;
            const address = document.getElementById("address").value;
            const phone = document.getElementById("phone").value;

            if (!name || !address || !phone) {
                alert("Please fill all fields");
                return;
            }

            localStorage.setItem("orderSuccess", name);
            localStorage.removeItem("selectedProduct");

            window.location.href = "homepage.html";
        }

        const container = document.getElementById("bottleContainer");

        function createBottles() {
            for (let i = 0; i < 16; i++) {

                const img = document.createElement("img");
                img.src = storedProduct.image;
                img.className = "bottle";

                img.style.left = Math.random() * 100 + "vw";
                img.style.top = Math.random() * 100 + "vh";

                img.style.animationDuration = (4 + Math.random() * 6) + "s";
                img.style.animationDelay = Math.random() * 5 + "s";

                img.style.transform = `scale(${0.2 + Math.random()})`;

                container.appendChild(img);
            }
        }

        createBottles();
    </script>

    <footer class="footer">
        © 2026 05AN by BOUMAHDI Anass et BARAKAT Kawtar
    </footer>

</body>

</html>
