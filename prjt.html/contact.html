<head>

    <link rel="stylesheet" href="contactus.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Inter:wght@300;400&family=Montserrat:wght@300;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="collection.html">COLLECTIONS</a>
                <a href="bestsellers.html">BEST SELLERS</a>
            </div>

            <div class="title">
                <h1>05AN</h1>
            </div>

            <div class="nav-right">
                <a href="index.html">HOME</a>
                <a href="aboutus.html">ABOUT US</a>
                <a href="contact.html">CONTACTS</a>
            </div>
        </nav>
    </header>


    <section class="contact-section">
        <div class="container">
            <div class="contact-info animate-left">
                <h1>LET'S <br><span>GET IN</span> <br>TOUCH</h1>
                <p>We'd love to hear from you! Whether you have questions, feedback, or need support, feel free to reach
                    out to us.</p>
            </div>

            <div class="contact-form animate-right">
                <form id="contactForm">
                    <div class="input-row">
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" placeholder="Your Last Name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>

                    <div class="input-group">
                        <label>Subject</label>
                        <input type="text" placeholder="How can we help?" required>
                    </div>

                    <div class="input-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" class="send-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">

    </footer>

</body>

</html>
